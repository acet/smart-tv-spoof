server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name cdn.samsungcloudsolution.com time.samsungcloudsolution.com;

    # Self-signed cert matching the Samsung domains
    # Generate with: scripts/generate-cert.sh /path/to/keys
    ssl_certificate /path/to/keys/samsung-spoof.crt;
    ssl_certificate_key /path/to/keys/samsung-spoof.key;

    location / {
        proxy_pass http://smart-tv-spoof:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}